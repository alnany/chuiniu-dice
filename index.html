<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>吹牛 · 摇骰子</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --gold: #f5a623;
      --white: #ffffff;
      --dim: rgba(255,255,255,0.5);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--white);
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      height: 100%; padding: 32px 20px 40px;
    }

    /* Header */
    .header { text-align: center; width: 100%; }
    .header h1 {
      font-size: 28px; font-weight: 700; letter-spacing: 4px;
      color: var(--gold); text-shadow: 0 0 20px rgba(245,166,35,0.4);
    }
    .header .subtitle { font-size: 13px; color: var(--dim); margin-top: 4px; letter-spacing: 1px; }

    /* Dice count */
    .count-row { display: flex; align-items: center; gap: 16px; }
    .count-label { font-size: 14px; color: var(--dim); }
    .count-btns { display: flex; gap: 8px; }
    .count-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15); background: transparent;
      color: var(--white); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .count-btn.active {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 12px rgba(233,69,96,0.5);
    }

    /* Cup zone */
    .cup-zone {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; flex: 1; width: 100%; position: relative;
    }

    /* Dice area — pushed to lower half so cup clears them when lifted */
    .dice-area {
      display: flex; flex-wrap: wrap; gap: 12px;
      justify-content: center; min-height: 80px;
      align-items: center; position: relative; z-index: 1;
      margin-top: 220px;
    }

    .die {
      width: 64px; height: 64px; background: var(--white);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.8);
      display: grid;
      grid-template-areas: "a . b" "c e d" "f . g";
      padding: 8px; gap: 3px;
      opacity: 0; transform: translateY(6px) scale(0.92);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .die.visible { opacity: 1; transform: translateY(0) scale(1); }

    .dot { width: 100%; height: 100%; border-radius: 50%; background: #1a1a2e; }
    .dot.wild { background: var(--accent); }
    .dot.red  { background: var(--accent); }

    /* ── CSS Dice Cup ── */
    .cup-wrapper {
      position: absolute;
      top: 10px; left: 50%; margin-left: -80px;
      width: 160px; height: 200px;
      cursor: grab; z-index: 10; touch-action: none;
      transform: translateY(0px); transition: transform 0s;
      display: flex; flex-direction: column; align-items: center;
    }
    .cup-wrapper.snap-up   { transition: transform 0.32s cubic-bezier(0.22,1,0.36,1); }
    .cup-wrapper.snap-down { transition: transform 0.28s cubic-bezier(0.55,0,1,0.45); }

    .cup-rim {
      width: 148px; height: 16px;
      background: linear-gradient(180deg, #2a5298 0%, #1a3a6e 100%);
      border-radius: 4px 4px 0 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .cup-body {
      width: 140px; height: 160px;
      position: relative;
      background: linear-gradient(160deg, #1e3d72 0%, #0f2d58 40%, #0a2040 100%);
      clip-path: polygon(14% 0%, 86% 0%, 100% 100%, 0% 100%);
      box-shadow: inset -4px 0 12px rgba(0,0,0,0.3), inset 4px 0 8px rgba(255,255,255,0.06);
    }
    .cup-body::before {
      content: '';
      position: absolute;
      top: 8px; left: 18%; width: 12%; height: 70%;
      background: linear-gradient(180deg, rgba(255,255,255,0.13), transparent);
      border-radius: 6px;
    }
    .cup-body::after {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 30px;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), transparent);
    }
    .cup-base {
      width: 100%; height: 14px;
      background: linear-gradient(180deg, #0a2040, #061528);
      border-radius: 0 0 8px 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      margin-top: -2px;
    }

    .cup-body.shaking { animation: shake 0.5s cubic-bezier(0.36,0.07,0.19,0.97); }

    /* Directional hints */
    .reveal-hint {
      position: absolute; bottom: -34px; left: 50%;
      transform: translateX(-50%);
      font-size: 13px; letter-spacing: 1px;
      opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity 0.3s;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    .reveal-hint.up   { color: var(--gold); --dy: -6px; }
    .reveal-hint.down { color: var(--dim);  --dy:  6px; }
    .reveal-hint.visible { opacity: 1; animation: bounceDir 1.2s ease-in-out infinite; }
    .reveal-hint .arrow { font-size: 18px; }

    .cup-hint {
      font-size: 13px; color: var(--dim); letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite;
      position: relative; z-index: 5;
      margin-top: 220px; transition: opacity 0.3s;
    }
    .cup-hint.hidden { opacity: 0; pointer-events: none; }

    /* Summary */
    .summary {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 12px 24px; font-size: 13px; color: var(--dim);
      text-align: center; min-height: 48px;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; width: 100%; max-width: 320px; flex-wrap: wrap;
      transition: opacity 0.3s;
    }
    .summary.hidden { opacity: 0; }
    .summary .count-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3);
      color: var(--gold); font-weight: 600; font-size: 13px;
    }

    /* Shake button */
    .shake-btn {
      width: 100%; max-width: 280px; height: 56px; border-radius: 28px;
      border: none; background: linear-gradient(135deg, var(--accent), #c0392b);
      color: var(--white); font-size: 18px; font-weight: 700; letter-spacing: 3px;
      cursor: pointer; box-shadow: 0 4px 24px rgba(233,69,96,0.4);
      transition: transform 0.1s, box-shadow 0.1s; position: relative; overflow: hidden;
    }
    .shake-btn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }
    .shake-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(233,69,96,0.3); }
    .shake-btn:active::before { left: 150%; }
    .shake-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes shake {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-12deg) scale(1.05) translateX(-4px); }
      30%  { transform: rotate(10deg) scale(0.98) translateX(4px); }
      45%  { transform: rotate(-8deg) scale(1.04) translateX(-3px); }
      60%  { transform: rotate(6deg) translateX(2px); }
      75%  { transform: rotate(-4deg); }
      90%  { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes bounceDir {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(var(--dy, -6px)); }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>吹　牛</h1>
    <div class="subtitle">LIAR'S DICE · 骰盅摇骰</div>
  </div>

  <div class="count-row">
    <span class="count-label">骰子数量</span>
    <div class="count-btns" id="countBtns">
      <button class="count-btn" data-n="1">1</button>
      <button class="count-btn active" data-n="2">2</button>
      <button class="count-btn" data-n="3">3</button>
      <button class="count-btn" data-n="4">4</button>
      <button class="count-btn" data-n="5">5</button>
    </div>
  </div>

  <div class="cup-zone" id="cupZone">
    <div class="dice-area" id="diceArea"></div>

    <div class="cup-wrapper" id="cupWrapper">
      <div class="cup-rim"></div>
      <div class="cup-body" id="cupBody"></div>
      <div class="cup-base"></div>
      <div class="reveal-hint up" id="hintUp">
        <span class="arrow">↑</span>
        <span>上滑查看</span>
      </div>
      <div class="reveal-hint down" id="hintDown">
        <span class="arrow">↓</span>
        <span>下滑藏住</span>
      </div>
    </div>

    <div class="cup-hint" id="cupHint">点击骰盅摇一摇</div>
  </div>

  <div class="summary hidden" id="summary">摇完后查看你的底牌</div>

  <button class="shake-btn" id="shakeBtn" onclick="doShake()">摇　一　摇</button>
</div>

<script>
  let diceCount  = 2;
  let isShaking  = false;
  let isRevealed = false;
  let hasRolled  = false;
  let lastRoll   = [];

  const LAYOUTS = {
    1: ['e'], 2: ['a','g'], 3: ['a','e','g'],
    4: ['a','b','f','g'], 5: ['a','b','e','f','g'],
    6: ['a','b','c','d','f','g'],
  };
  const ALL_AREAS = ['a','b','c','d','e','f','g'];

  function renderDie(value) {
    const die = document.createElement('div');
    die.className = 'die';
    ALL_AREAS.forEach(area => {
      const el = document.createElement('div');
      el.style.gridArea = area;
      if (LAYOUTS[value].includes(area))
        el.className = value === 1 ? 'dot wild' : value === 4 ? 'dot red' : 'dot';
      die.appendChild(el);
    });
    return die;
  }

  function buildSummary(rolls) {
    const counts = {};
    rolls.forEach(v => {
      if (v === 1) { for (let i=2;i<=6;i++) counts[i]=(counts[i]||0)+1; counts[1]=(counts[1]||0)+1; }
      else counts[v] = (counts[v]||0)+1;
    });
    const tags = [];
    const wilds = rolls.filter(v=>v===1).length;
    if (wilds>0) tags.push(`<span class="count-tag">⭐ ×${wilds} 野</span>`);
    for (let f=2;f<=6;f++) if (counts[f]) tags.push(`<span class="count-tag">${['一','二','三','四','五','六'][f-1]} ×${counts[f]}</span>`);
    return tags.join(' ');
  }

  function doShake() {
    if (isShaking) return;
    isShaking = true; isRevealed = false; hasRolled = false;

    const cupBody = document.getElementById('cupBody');
    const btn     = document.getElementById('shakeBtn');
    const wrapper = document.getElementById('cupWrapper');

    wrapper.classList.remove('snap-up','snap-down');
    wrapper.style.transform = 'translateY(0px)';
    document.getElementById('hintUp').classList.remove('visible');
    document.getElementById('hintDown').classList.remove('visible');
    document.getElementById('cupHint').classList.add('hidden');
    document.getElementById('summary').classList.add('hidden');

    const da = document.getElementById('diceArea');
    Array.from(da.children).forEach(d => d.classList.remove('visible'));

    cupBody.classList.remove('shaking');
    void cupBody.offsetWidth;
    cupBody.classList.add('shaking');
    btn.disabled = true;
    if (navigator.vibrate) navigator.vibrate([60,30,60]);

    setTimeout(() => {
      lastRoll = Array.from({length:diceCount}, ()=>Math.ceil(Math.random()*6));
      da.innerHTML = '';
      lastRoll.forEach(v => da.appendChild(renderDie(v)));
      setTimeout(() => {
        cupBody.classList.remove('shaking');
        isShaking = false; hasRolled = true; btn.disabled = false;
        document.getElementById('hintUp').classList.add('visible');
        if (navigator.vibrate) navigator.vibrate(40);
      }, 300);
    }, 500);
  }

  const LIFT_THRESHOLD = 55, LIFT_DISTANCE = 230;

  function revealDice() {
    if (isRevealed) return;
    isRevealed = true;
    const wrapper = document.getElementById('cupWrapper');
    const da = document.getElementById('diceArea');
    wrapper.classList.add('snap-up');
    wrapper.style.transform = `translateY(-${LIFT_DISTANCE}px)`;
    document.getElementById('hintUp').classList.remove('visible');
    Array.from(da.children).forEach((d,i) => setTimeout(()=>d.classList.add('visible'), i*80));
    setTimeout(() => {
      const s = document.getElementById('summary');
      s.innerHTML = buildSummary(lastRoll); s.classList.remove('hidden');
      document.getElementById('hintDown').classList.add('visible');
    }, lastRoll.length*80+100);
    if (navigator.vibrate) navigator.vibrate([30,20,60]);
  }

  function hideDice() {
    if (!isRevealed) return;
    isRevealed = false;
    const wrapper = document.getElementById('cupWrapper');
    const da = document.getElementById('diceArea');
    Array.from(da.children).forEach(d => d.classList.remove('visible'));
    document.getElementById('summary').classList.add('hidden');
    document.getElementById('hintDown').classList.remove('visible');
    setTimeout(() => {
      wrapper.classList.remove('snap-up');
      wrapper.classList.add('snap-down');
      wrapper.style.transform = 'translateY(0px)';
      setTimeout(() => document.getElementById('hintUp').classList.add('visible'), 320);
    }, 150);
  }

  const wrapper = document.getElementById('cupWrapper');
  let touchStartY = null, dragY = 0;

  wrapper.addEventListener('touchstart', e => {
    if (isShaking) return;
    if (!hasRolled) { doShake(); return; }
    touchStartY = e.touches[0].clientY; dragY = 0;
    wrapper.classList.remove('snap-up','snap-down');
  }, {passive:true});

  wrapper.addEventListener('touchmove', e => {
    if (touchStartY===null) return;
    const delta = touchStartY - e.touches[0].clientY;
    if (!isRevealed) {
      dragY = Math.max(0, delta);
      wrapper.style.transform = `translateY(-${Math.min(dragY,LIFT_DISTANCE)}px)`;
    } else {
      dragY = Math.max(0, -delta);
      wrapper.style.transform = `translateY(-${LIFT_DISTANCE - Math.min(dragY,LIFT_DISTANCE)}px)`;
    }
  }, {passive:true});

  wrapper.addEventListener('touchend', () => {
    if (touchStartY===null) return;
    touchStartY = null;
    if (!isRevealed) {
      if (dragY >= LIFT_THRESHOLD) revealDice();
      else { wrapper.classList.add('snap-down'); wrapper.style.transform='translateY(0px)'; }
    } else {
      if (dragY >= LIFT_THRESHOLD) hideDice();
      else { wrapper.classList.add('snap-up'); wrapper.style.transform=`translateY(-${LIFT_DISTANCE}px)`; }
    }
    dragY = 0;
  });

  let mStartY = null, mDragY = 0;
  wrapper.addEventListener('mousedown', e => {
    if (isShaking) return;
    if (!hasRolled) { doShake(); return; }
    mStartY = e.clientY; mDragY = 0;
    wrapper.classList.remove('snap-up','snap-down');
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (mStartY===null) return;
    const delta = mStartY - e.clientY;
    if (!isRevealed) {
      mDragY = Math.max(0, delta);
      wrapper.style.transform = `translateY(-${Math.min(mDragY,LIFT_DISTANCE)}px)`;
    } else {
      mDragY = Math.max(0, -delta);
      wrapper.style.transform = `translateY(-${LIFT_DISTANCE-Math.min(mDragY,LIFT_DISTANCE)}px)`;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mStartY===null) return;
    mStartY = null;
    if (!isRevealed) {
      if (mDragY >= LIFT_THRESHOLD) revealDice();
      else { wrapper.classList.add('snap-down'); wrapper.style.transform='translateY(0px)'; }
    } else {
      if (mDragY >= LIFT_THRESHOLD) hideDice();
      else { wrapper.classList.add('snap-up'); wrapper.style.transform=`translateY(-${LIFT_DISTANCE}px)`; }
    }
    mDragY = 0;
  });

  document.getElementById('countBtns').addEventListener('click', e => {
    const btn = e.target.closest('.count-btn');
    if (!btn) return;
    diceCount = parseInt(btn.dataset.n);
    document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const w = document.getElementById('cupWrapper');
    w.classList.remove('snap-up','snap-down'); w.style.transform='translateY(0px)';
    document.getElementById('diceArea').innerHTML='';
    const s=document.getElementById('summary');
    s.classList.add('hidden'); s.innerHTML='摇完后查看你的底牌';
    document.getElementById('cupHint').classList.remove('hidden');
    document.getElementById('hintUp').classList.remove('visible');
    document.getElementById('hintDown').classList.remove('visible');
    isRevealed=false; hasRolled=false; lastRoll=[];
  });
</script>
</body>
</html>
